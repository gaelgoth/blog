name: CI

on:
  pull_request:
  # branches: [main]
  push:
# branches: [main]

jobs:
  check:
    name: Format, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb #v2.0.3
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Build (with URL check)
        env:
          CI: "true"
        run: deno task build
